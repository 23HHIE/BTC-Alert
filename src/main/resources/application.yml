server:
  port: 8081

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: btc-group
      auto-offset-reset: earliest

  datasource:
    url: jdbc:mysql://localhost:3306/btcdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: btc
    password: btc123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

app:
  kafka:
    topic: market-data
  jwt:
    secret: btc-kafka-super-secret-key-for-jwt-signing-2024
    expiration-ms: 86400000
