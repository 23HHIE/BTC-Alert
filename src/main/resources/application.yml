server:
  port: 8081

spring:
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: btc-group
      auto-offset-reset: earliest

  datasource:
    url: jdbc:h2:mem:btcdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  kafka:
    topic: market-data
  jwt:
    secret: btc-kafka-super-secret-key-for-jwt-signing-2024
    expiration-ms: 86400000
